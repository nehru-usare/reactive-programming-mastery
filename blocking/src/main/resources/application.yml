server:
  port: 8080

spring:
  application:
    name: blocking
  datasource:
    url: jdbc:h2:mem:blockingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console
